<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Web Storage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div class="title">☁️ Web Storage</div>
  <input type="text" id="searchInput" class="search" placeholder="Search file...">
</div>

<div class="container">

  <!-- ADMIN -->
  <div class="card" id="adminPanel">
    <input type="text" id="folderInput" placeholder="Folder (opsional)">
    <input type="file" id="fileInput" multiple>
    <button id="uploadBtn">Upload</button>

    <div id="dropZone" class="drop-zone">
      Drag & Drop file di sini
    </div>
  </div>

  <!-- STORAGE INFO -->
  <div class="card">
    <b id="storageInfo"></b>
  </div>

  <!-- UPLOAD PROGRESS -->
  <div class="card">
    <h3>Upload Progress</h3>
    <div id="uploadList"></div>
  </div>

  <!-- FILE LIST -->
  <div class="card">
    <button id="backBtn" style="display:none;">⬅️ Back</button>
    <div id="fileList"></div>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
