<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Web Storage</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="guest">

<!-- HEADER -->
<div class="header">

  <div class="left">
    ☁️ Web Storage
  </div>

  <div class="center">
    <button id="backBtn" style="display:none;">⬅️ Kembali</button>
  </div>

  <div class="right">
    <input type="text" id="searchInput" class="search" placeholder="Search file...">
  </div>

</div>

<!-- MAIN -->
<div class="container">

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="card">
    <input type="text" id="folderInput" placeholder="Folder (opsional)">
    <input type="file" id="fileInput" multiple>
    <button id="uploadBtn">Upload</button>

    <div id="dropZone" class="drop-zone">
      Drag & Drop file di sini
    </div>

    <div id="uploadList"></div>
  </div>

  <!-- FILE LIST -->
  <div class="card">
    <div id="fileList"></div>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
